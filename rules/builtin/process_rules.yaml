# Process execution detection rules

- rule: Shell spawned by web server
  desc: A shell process was spawned by a web server process, indicating a possible web shell or RCE
  condition: >
    evt.type == 'execve' and
    shell_procs and
    proc.pname in ['nginx', 'apache', 'apache2', 'httpd', 'php-fpm', 'php', 'node', 'python', 'ruby', 'java', 'tomcat']
  output: "Shell spawned by %proc.pname% (pid=%proc.pid% cmdline=%proc.cmdline% container=%container.name%)"
  priority: CRITICAL
  tags: [T1505.003, web_shell, reverse_shell, mitre_persistence]
  metadata:
    mitre_attck: "T1505.003 - Web Shell"

- rule: Reverse shell command detected
  desc: A command matching known reverse shell patterns was executed
  condition: >
    evt.type == 'execve' and
    (proc.cmdline.contains('/dev/tcp') or
     proc.cmdline.contains('nc -e /bin/') or
     proc.cmdline.contains('nc --exec /bin/') or
     proc.cmdline.contains('socat') and proc.cmdline.contains('exec') and proc.cmdline.contains('pty') or
     proc.cmdline.contains('mkfifo') and proc.cmdline.contains('/tmp/') and proc.cmdline.contains('nc'))
  output: "Reverse shell detected (pid=%proc.pid% cmdline=%proc.cmdline% user=%proc.uid% container=%container.name%)"
  priority: CRITICAL
  tags: [T1059.004, reverse_shell, mitre_execution]
  metadata:
    mitre_attck: "T1059.004 - Unix Shell"

- rule: Download and execute
  desc: A download tool is piping output to a shell interpreter
  condition: >
    evt.type == 'execve' and
    (proc.cmdline.contains('curl') and proc.cmdline.contains('| sh') or
     proc.cmdline.contains('curl') and proc.cmdline.contains('| bash') or
     proc.cmdline.contains('wget') and proc.cmdline.contains('| sh') or
     proc.cmdline.contains('wget') and proc.cmdline.contains('| bash') or
     proc.cmdline.contains('curl') and proc.cmdline.contains('-o /tmp/') and proc.cmdline.contains('chmod'))
  output: "Download and execute detected (pid=%proc.pid% cmdline=%proc.cmdline% container=%container.name%)"
  priority: CRITICAL
  tags: [T1059, download_exec, mitre_execution]
  metadata:
    mitre_attck: "T1059 - Command and Scripting Interpreter"

- rule: Base64 encoded command execution
  desc: Encoded commands being decoded and executed, common in obfuscated attacks
  condition: >
    evt.type == 'execve' and
    (proc.cmdline.contains('base64 -d') and proc.cmdline.contains('| sh') or
     proc.cmdline.contains('base64 -d') and proc.cmdline.contains('| bash') or
     proc.cmdline.contains('base64') and proc.cmdline.contains('exec'))
  output: "Encoded command execution (pid=%proc.pid% cmdline=%proc.cmdline% container=%container.name%)"
  priority: ALERT
  tags: [T1027, obfuscation, mitre_defense_evasion]
  metadata:
    mitre_attck: "T1027 - Obfuscated Files or Information"

- rule: Cryptominer process detected
  desc: Process matching known cryptominer indicators
  condition: >
    evt.type == 'execve' and
    (proc.cmdline.contains('stratum+tcp://') or
     proc.name in ['xmrig', 'minerd', 'cpuminer', 'cgminer', 'ethminer'] or
     proc.cmdline.contains('cryptonight') or
     proc.cmdline.contains('--donate-level') or
     proc.cmdline.contains('pool.minergate') or
     proc.cmdline.contains('supportxmr') or
     proc.cmdline.contains('nanopool'))
  output: "Cryptominer detected: %proc.name% (pid=%proc.pid% cmdline=%proc.cmdline% container=%container.name%)"
  priority: ALERT
  tags: [T1496, cryptominer, mitre_impact]
  metadata:
    mitre_attck: "T1496 - Resource Hijacking"

- rule: Privilege escalation - root from non-root parent
  desc: A process running as root was spawned from a non-root parent
  condition: >
    evt.type == 'execve' and
    proc.uid == 0 and
    proc.ppid > 1
  output: "Privilege escalation: %proc.name% running as root from ppid=%proc.ppid% (cmdline=%proc.cmdline% container=%container.name%)"
  priority: ALERT
  tags: [T1068, privilege_escalation, mitre_privilege_escalation]
  metadata:
    mitre_attck: "T1068 - Exploitation for Privilege Escalation"

- rule: Command history clearing
  desc: A process is clearing or disabling command history
  condition: >
    evt.type == 'execve' and
    (proc.cmdline.contains('history -c') or
     proc.cmdline.contains('unset HISTFILE') or
     proc.cmdline.contains('rm') and proc.cmdline.contains('.bash_history'))
  output: "History clearing detected (pid=%proc.pid% cmdline=%proc.cmdline% container=%container.name%)"
  priority: WARNING
  tags: [T1070.003, defense_evasion, mitre_defense_evasion]
  metadata:
    mitre_attck: "T1070.003 - Clear Command History"

- rule: Process memory access
  desc: A process is using ptrace or process_vm_readv/writev for cross-process memory access
  condition: >
    evt.type == 'execve' and
    (proc.cmdline.contains('gdb') and proc.cmdline.contains('attach') or
     proc.cmdline.contains('/proc/') and proc.cmdline.contains('/mem'))
  output: "Process memory access detected (pid=%proc.pid% cmdline=%proc.cmdline% container=%container.name%)"
  priority: ALERT
  tags: [T1055, process_injection, mitre_defense_evasion]
  metadata:
    mitre_attck: "T1055 - Process Injection"
